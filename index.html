<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>招式修練追蹤器</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-header">
        <h1>招式修練追蹤器</h1>
        <div class="user-status">持續修練，頂峰相見</div>
    </div>

    <div class="app-content">
        
        <div class="card-section" id="new-skill-section">
            <h2>🔥 新招式挑戰</h2>
            <div class="trick-card challenge">
                <div class="trick-info">
                    <div class="trick-name" id="new-skill-name">暫無新招式</div>
                    <div class="trick-desc">完成 10 次即可晉升為熟練招式</div>
                </div>
                <div class="counter-area">
                    <div class="count-display">
                        <span class="today-count" id="new-skill-count">0</span> / 10
                    </div>
                    <div class="challenge-actions">
                        <button class="btn-count btn-success" id="new-skill-btn" onclick="practiceNewSkill()">完成一次</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="card-section" id="mastered-skill-section">
            <h2>✨ 熟練招複習</h2>
            <div class="trick-card">
                <div class="trick-info">
                    <div class="trick-name" id="mastered-skill-name">暫無熟練招式</div>
                    <div class="trick-desc">精益求精，持續複習</div>
                </div>
                <div class="counter-area">
                    <div class="count-display">
                        總計 <span class="today-count" id="mastered-skill-count">0</span> 次
                    </div>
                    <div class="count-actions">
                        <button class="btn-count btn-warning" id="mastered-skill-btn" onclick="practiceMasteredSkill()">完成並切換</button>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <div class="bottom-nav">
        <button class="nav-btn left-btn" onclick="addNewSkillPrompt()">新增招式</button>
        <button class="nav-btn right-btn" id="stats-btn" onclick="showStats()">查看統計</button>
    </div>

<script>
    // 狀態資料
    let state = {
        newSkills: ["基礎正拳", "旋風踢"], 
        masteredSkills: [
            { name: "閃避步法", count: 5 },
            { name: "反擊直拳", count: 12 }
        ], 
        currentNewIndex: 0,
        currentMasteredIndex: 0,
        currentNewPracticeCount: 0
    };

    // 初始化顯示
    function init() {
        updateNewSkillDisplay();
        updateMasteredSkillDisplay();
    }

    // 更新新招式畫面
    function updateNewSkillDisplay() {
        const nameEl = document.getElementById('new-skill-name');
        const countEl = document.getElementById('new-skill-count');
        const btnEl = document.getElementById('new-skill-btn');

        if (state.newSkills.length > 0 && state.currentNewIndex < state.newSkills.length) {
            nameEl.innerText = state.newSkills[state.currentNewIndex];
            countEl.innerText = state.currentNewPracticeCount;
            btnEl.disabled = false;
        } else {
            nameEl.innerText = "🎉 所有新招式皆已練成！";
            countEl.innerText = "-";
            btnEl.disabled = true;
        }
    }

    // 更新熟練招畫面
    function updateMasteredSkillDisplay() {
        const nameEl = document.getElementById('mastered-skill-name');
        const countEl = document.getElementById('mastered-skill-count');
        const btnEl = document.getElementById('mastered-skill-btn');

        if (state.masteredSkills.length > 0) {
            // 確保索引不越界
            if (state.currentMasteredIndex >= state.masteredSkills.length) {
                state.currentMasteredIndex = 0;
            }
            const currentSkill = state.masteredSkills[state.currentMasteredIndex];
            nameEl.innerText = currentSkill.name;
            countEl.innerText = currentSkill.count;
            btnEl.disabled = false;
        } else {
            nameEl.innerText = "暫無熟練招式";
            countEl.innerText = "0";
            btnEl.disabled = true;
        }
    }

    // 新招式點擊邏輯
    function practiceNewSkill() {
        if (state.newSkills.length === 0) return;
        
        state.currentNewPracticeCount++;
        if (state.currentNewPracticeCount >= 10) {
            const skillName = state.newSkills[state.currentNewIndex];
            // 晉升到熟練招
            state.masteredSkills.push({ name: skillName, count: 0 });
            alert(`恭喜！「${skillName}」已修練有成，晉升為熟練招式！`);
            
            // 移除該新招式並重置計數
            state.newSkills.splice(state.currentNewIndex, 1);
            state.currentNewPracticeCount = 0;
        }
        updateNewSkillDisplay();
        updateMasteredSkillDisplay();
    }

    // 熟練招點擊計數並自動切換下一招
    function practiceMasteredSkill() {
        if (state.masteredSkills.length === 0) return;

        // 1. 當前招式次數加 1
        state.masteredSkills[state.currentMasteredIndex].count++;

        // 2. 切換到下一招（若到末尾則回到第一招）
        state.currentMasteredIndex = (state.currentMasteredIndex + 1) % state.masteredSkills.length;

        // 3. 渲染更新畫面
        updateMasteredSkillDisplay();
    }

    // 新增招式彈窗
    function addNewSkillPrompt() {
        const skillName = prompt("請輸入新招式名稱：");
        if (skillName && skillName.trim() !== "") {
            state.newSkills.push(skillName.trim());
            if (state.newSkills.length === 1) state.currentNewIndex = 0;
            updateNewSkillDisplay();
        }
    }

    // 統計按鈕點擊功能
    function showStats() {
        let statsMsg = "📊 當前修練進度統計：\n\n";
        statsMsg += `未練成新招式數量：${state.newSkills.length} 招\n`;
        statsMsg += `已解鎖熟練招式數量：${state.masteredSkills.length} 招\n\n`;
        statsMsg += "熟練招明細：\n";
        state.masteredSkills.forEach(s => {
            statsMsg += `- ${s.name}: 複習 ${s.count} 次\n`;
        });
        alert(statsMsg);
    }

    // 頁面載入完成後執行
    window.onload = init;
</script>

</body>
</html>

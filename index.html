<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>劍玉招式練習庫</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header class="app-header">
        <h1>劍玉練習庫</h1>
        <div id="user-status" class="user-status">🟢 未登入 (功能皆可使用，進度將不儲存)</div>
    </header>

    <main class="app-content">
        <section class="card-section">
            <h2>🔥 今日穩固 (熟練池)</h2>
            <div id="stable-trick-card" class="trick-card">
                <div class="trick-info">
                    <div class="trick-name" id="stable-trick-name">載入中...</div>
                    <div class="trick-desc">精益求精，持續複習</div>
                    
                    <div style="margin-top: 15px; display: flex; gap: 8px; flex-direction: column;">
                        <select id="select-stable-trick" style="width: 100%; padding: 8px; border-radius: 4px; border: 1px solid #ddd;">
                            <option value="">-- 手選熟練招式 --</option>
                        </select>
                        <button id="btn-next-stable" class="btn-action-main">
                            🎲 隨機換熟練招式
                        </button>
                    </div>
                </div>

                <div class="counter-area">
                    <div class="count-display">
                        目標: <span class="target-count" id="stable-target-count">-</span> 次
                    </div>
                    <div class="count-display">
                        今日: <span class="today-count" id="stable-today-count">0</span> 次
                    </div>
                    <div class="count-actions" style="margin-top: 5px;">
                        <button class="btn-count" data-add="1" onclick="adjustStableCount(1)">+1</button>
                        <button class="btn-count" data-add="-1" onclick="adjustStableCount(-1)">-1</button>
                    </div>
                    <button class="btn-action-main btn-warning" style="width: 100%; margin-top: 8px;" onclick="completeAndNextStable()">
                        完成並切換
                    </button>
                </div>
            </div>
        </section>

        <section class="card-section">
            <h2>🎯 新招式挑戰</h2>
            <div id="challenge-trick-card" class="trick-card challenge">
                <div class="trick-info">
                    <div class="trick-name" id="challenge-trick-name">載入中...</div>
                    <div class="trick-desc">挑戰成功即可解鎖至熟練池</div>
                    
                    <div style="margin-top: 15px; display: flex; gap: 8px; flex-direction: column;">
                        <select id="select-challenge-trick" style="width: 100%; padding: 8px; border-radius: 4px; border: 1px solid #ddd;">
                            <option value="">-- 手選挑戰招式 --</option>
                        </select>
                        <button id="btn-next-challenge" class="btn-action-main" style="background-color: #e74c3c;">
                            🎲 隨機換挑戰招式
                        </button>
                    </div>
                </div>

                <div class="counter-area">
                    <div class="challenge-actions">
                        <button id="btn-challenge-success" class="btn-action-main btn-success" style="margin-top: 0; padding: 12px;">
                            🏆 挑戰成功<br>(解鎖)
                        </button>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <nav class="bottom-nav">
        <button id="btn-login-trigger" class="nav-btn left-btn">👤 選手登入</button>
        <button id="btn-library-trigger" class="nav-btn right-btn">📖 完整招式庫</button>
        <button id="btn-stats-trigger" class="nav-btn" style="background-color: #34495e; flex: 0 0 30%;" onclick="openStatsModal()">📊 查看統計</button>
    </nav>

    <div id="modal-login" class="modal hidden">
        <div class="modal-content">
            <h3>👤 選手登入 / 切換帳號</h3>
            <p style="font-size: 0.85rem; color: #7f8c8d; margin-bottom: 10px;">輸入您的獨特暱稱，系統將會為您在雲端保存專屬練習紀錄。</p>
            <input type="text" id="login-username" placeholder="請輸入您的暱稱 (例如: 貓貓)">
            <div class="modal-actions">
                <button id="btn-login-submit" class="btn-success" style="color: white; font-weight: bold;">登入</button>
                <button id="btn-login-close" class="btn-secondary">取消</button>
            </div>
        </div>
    </div>

    <div id="modal-library" class="modal hidden">
        <div class="modal-content library-content">
            <h3 style="margin-top: 0; margin-bottom: 15px;">📖 完整招式庫</h3>
            <div id="library-list" class="library-list"></div>
            <button id="btn-library-close" class="btn-secondary" style="margin-top: 15px;">返回首頁</button>
        </div>
    </div>

    <div id="modal-stats" class="modal hidden">
        <div class="modal-content library-content">
            <h3 style="margin-top: 0; margin-bottom: 15px;">📊 當前練習統計</h3>
            <div id="stats-list" class="library-list" style="font-size: 0.95rem;">
                </div>
            <button class="btn-secondary" style="margin-top: 15px;" onclick="closeStatsModal()">關閉</button>
        </div>
    </div>

    <script type="importmap">
        {
          "imports": {
            "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
            "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"
          }
        }
    </script>
    <script type="module">
        import { AppController } from "./js/app.js";
        
        // DOM 完全載入後才執行初始化
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', () => {
                AppController.init();
                setupCustomActions();
            });
        } else {
            AppController.init();
            setupCustomActions();
        }

        // 擴充前端互動邏輯（完成切換與統計彈窗控制）
        function setupCustomActions() {
            // 保留給 app.js 核心事件綁定擴充使用
        }
    </script>

    <script>
        // 為了不干涉你 app.js 裡的核心資料邏輯，這裡提供按鈕直連的模擬展示控制
        // 實際整合時，請確保這些前端 function 有同步呼叫到你 AppController 內的資料變更

        function adjustStableCount(amount) {
            const countEl = document.getElementById('stable-today-count');
            let current = parseInt(countEl.innerText) || 0;
            current = Math.max(0, current + amount);
            countEl.innerText = current;
        }

        function completeAndNextStable() {
            // 1. 次數 +1
            adjustStableCount(1);
            
            // 2. 觸發更換下一招 (觸發原本隨機換招按鈕的點擊事件)
            const nextBtn = document.getElementById('btn-next-stable');
            if (nextBtn) {
                nextBtn.click();
            }
        }

        function openStatsModal() {
            const modal = document.getElementById('modal-stats');
            const list = document.getElementById('stats-list');
            if (modal && list) {
                // 讀取當前畫面上的招式做簡單呈現，實際應從資料庫撈取
                const stableName = document.getElementById('stable-trick-name').innerText;
                const stableCount = document.getElementById('stable-today-count').innerText;
                
                list.innerHTML = `
                    <div class="lib-item">
                        <span>當前熟練招式: <strong>${stableName}</strong></span>
                        <span class="lib-count-info">今日已練: ${stableCount} 次</span>
                    </div>
                    <div class="lib-item" style="color: #7f8c8d; font-size:0.85rem; text-align:center; justify-content:center;">
                        完整歷史進度已同步保存於雲端
                    </div>
                `;
                modal.classList.remove('hidden');
            }
        }

        function closeStatsModal() {
            const modal = document.getElementById('modal-stats');
            if (modal) modal.classList.add('hidden');
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>劍玉招式練習</title>
    <link rel="stylesheet" href="css/style.css"/>
    <!-- 網站圖示（瀏覽器分頁、加入主畫面的圖示）統一使用招式庫照片 -->
    <link rel="icon" type="image/png" href="images/library-icon.png"/>
    <link rel="apple-touch-icon" href="images/library-icon.png"/>
</head>
<body>

    <header class="app-header">
        <h1>劍玉招式練習</h1>
        <button id="btn-version" class="version-badge" title="查看更新紀錄">v-</button>
        <!-- 修改：選手資訊與切換帳號按鈕改成同一排，按鈕放在選手文字右側 -->
        <div class="header-account-row">
            <div id="user-status" class="user-status">未登入 (功能皆可使用，進度將不儲存)</div>
            <button id="btn-login-trigger" class="header-account-btn">帳號登入</button>
        </div>
    </header>

    <main class="app-content">
        <section class="card-section stats-section">
            <h2>今日練習統計</h2>
            <div id="stats-section-list" class="library-list stats-inline-list">
                <div class="empty-tip">今日暫無有效練習數據</div>
            </div>
        </section>

        <section class="card-section stable-section">
            <h2>今日穩固招式</h2>
            <div id="stable-trick-card" class="trick-card stable">
                <div class="trick-info">
                    <div class="trick-name" id="stable-trick-name">載入中...</div>
                    
                    <div class="card-controls">
                        <div class="trick-picker">
                            <select id="select-stable-category" class="app-select">
                                <option value="">全部</option>
                            </select>
                            <select id="select-stable-subcategory" class="app-select">
                                <option value="">全部</option>
                            </select>
                            <select id="select-stable-trick" class="app-select">
                                <option value="">選擇招式</option>
                            </select>
                        </div>
                        <button id="btn-next-stable" class="btn-action secondary">隨機換一招</button>
                    </div>
                </div>

                <div class="counter-box">
                    <div class="counter-display">
                        <div class="counter-item">
                            <span class="label">目標</span>
                            <span class="value target-count">-</span>
                        </div>
                        <div class="counter-item">
                            <span class="label">今日</span>
                            <input type="number" inputmode="numeric" min="0" class="value today-count" />
                        </div>
                    </div>
                    <div class="button-group">
                        <button class="btn-count" data-add="1">+</button>
                        <button class="btn-count" data-add="-1">-</button>
                    </div>
                </div>
            </div>
        </section>

        <section class="card-section challenge-section">
            <h2>新招式挑戰</h2>
            <div id="challenge-trick-card" class="trick-card challenge">
                <div class="trick-info">
                    <div class="trick-name" id="challenge-trick-name">載入中...</div>
                    
                    
                    <div class="card-controls">
                        <div class="trick-picker">
                            <select id="select-challenge-category" class="app-select">
                                <option value="">全部</option>
                            </select>
                            <select id="select-challenge-subcategory" class="app-select">
                                <option value="">全部</option>
                            </select>
                            <select id="select-challenge-trick" class="app-select">
                                <option value="">選擇招式</option>
                            </select>
                        </div>
                        <button id="btn-next-challenge" class="btn-action secondary">隨機換一招</button>
                    </div>
                </div>
                
                <div class="action-box">
                    <button id="btn-challenge-success" class="btn-action success">挑戰成功</button>
                </div>
            </div>
        </section>
    </main>

    <nav class="bottom-nav">
        <button id="btn-library-trigger" class="btn-library-main" type="button" aria-label="完整招式庫">
            <span class="library-badge">
                <span class="library-icon-wrap">
                    <img src="images/library-icon.png" alt="完整招式庫" class="library-icon-img"
                         onerror="this.style.display='none'; this.parentElement.classList.add('no-image');" />
                </span>
            </span>
        </button>
    </nav>

    <div id="modal-login" class="modal hidden">
        <div class="modal-content">
            <h3>帳號登入</h3>
            <p class="modal-tip">輸入您的獨特暱稱，系統將會為您在雲端保存專屬練習紀錄。</p>
            <input type="text" id="login-username" placeholder="請輸入您的暱稱 (例如: 貓貓)">
            <div class="modal-actions">
                <button id="btn-login-submit" class="btn-action success">登入</button>
                <button id="btn-login-close" class="btn-action secondary">取消</button>
            </div>
            <button id="btn-logout" class="btn-action logout hidden">登出（回到訪客模式）</button>
        </div>
    </div>

    <div id="modal-library" class="modal hidden">
        <div class="modal-content library-content">
            <h3>完整招式庫</h3>
            
            <div class="filter-group">
                <select id="filter-category" class="app-select">
                    <option value="">全部大分類</option>
                </select>
                <select id="filter-subcategory" class="app-select">
                    <option value="">全部小分類</option>
                </select>
            </div>

            <div class="sort-bar">
                <label for="select-sort-mode" class="sort-label">排序依據</label>
                <select id="select-sort-mode" class="app-select">
                    <option value="default">預設順序</option>
                    <option value="count-desc">練習次數：高到低</option>
                    <option value="count-asc">練習次數：低到高</option>
                    <option value="unlocked-first">已解鎖優先</option>
                    <option value="locked-first">未解鎖優先</option>
                </select>
            </div>

            <div class="bulk-unlock-bar">
                <button id="btn-bulk-unlock-toggle" class="btn-action secondary">一鍵解鎖模式</button>
            </div>
            <div id="bulk-unlock-actions" class="bulk-unlock-actions hidden">
                <div class="bulk-unlock-header">
                    <span class="bulk-unlock-tip">勾選要解鎖的招式，再按下方按鈕確認</span>
                    <button id="btn-bulk-select-all" class="btn-action secondary">全選本分類</button>
                </div>
                <div class="bulk-unlock-buttons">
                    <button id="btn-bulk-unlock-confirm" class="btn-action success">確認解鎖已勾選招式</button>
                    <button id="btn-bulk-unlock-cancel" class="btn-action secondary">取消</button>
                </div>
            </div>

            <div id="library-list" class="library-list"></div>
            <button id="btn-library-close" class="btn-action secondary">返回首頁</button>
        </div>
    </div>

    <div id="modal-version" class="modal hidden">
        <div class="modal-content version-content">
            <h3>更新紀錄</h3>
            <div id="version-list" class="library-list"></div>
            <button id="btn-version-close" class="btn-action secondary">返回首頁</button>
        </div>
    </div>

    <script type="importmap">
        {
          "imports": {
            "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
            "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"
          }
        }
    </script>
    <script type="module">
        import { AppController } from "./js/app.js";
        document.addEventListener("DOMContentLoaded", () => {
            AppController.init();
        });
    </script>

</body>
</html>

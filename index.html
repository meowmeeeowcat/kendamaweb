<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>劍玉招式練習庫</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header class="app-header">
        <h1>劍玉練習庫</h1>
        <div id="user-status" class="user-status">🟢 未登入 (功能皆可使用，進度將不儲存)</div>
    </header>

    <main class="app-content">
        <section class="card-section">
            <div id="stable-trick-card" class="card">
                <h2>🔥 今日穩固 (熟練池)</h2>
                <div class="trick-name">載入中...</div>
                <div class="counter-display">
                    <span>目標: <span class="target-count">-</span> 次</span>
                    <span>今日: <span class="today-count">-</span> 次</span>
                </div>
                <div class="button-group">
                    <button class="btn-count" data-add="1">+1</button>
                    <button class="btn-count" data-add="-1">-1</button>
                </div>
                
                <div style="margin-top: 15px; display: flex; gap: 8px; flex-direction: column;">
                    <select id="select-stable-trick" style="width: 100%; padding: 8px; border-radius: 4px;">
                        <option value="">-- 手選熟練招式 --</option>
                    </select>
                    <button id="btn-next-stable" style="background-color: #3498db; color: white; padding: 10px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer;">
                        🎲 隨機換熟練招式
                    </button>
                </div>
            </div>
        </section>

        <section class="card-section">
            <div id="challenge-trick-card" class="card challenge">
                <h2>🎯 新招式挑戰</h2>
                <div class="trick-name">載入中...</div>
                
                <div style="margin-top: 15px; display: flex; gap: 8px; flex-direction: column;">
                    <select id="select-challenge-trick" style="width: 100%; padding: 8px; border-radius: 4px;">
                        <option value="">-- 手選挑戰招式 --</option>
                    </select>
                    <div style="display: flex; gap: 8px;">
                        <button id="btn-next-challenge" style="flex: 1; background-color: #e74c3c; color: white; padding: 10px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer;">
                            🎲 隨機換挑戰招式
                        </button>
                        <button id="btn-challenge-success" style="flex: 1; background-color: #2ecc71; color: white; padding: 10px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer;">
                            🏆 挑戰成功 (解鎖)
                        </button>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <nav class="bottom-nav">
        <button id="btn-login-trigger" class="nav-item">👤 選手登入</button>
        <button id="btn-library-trigger" class="nav-item">📖 完整招式庫</button>
    </nav>

    <div id="modal-login" class="modal hidden">
        <div class="modal-content">
            <h3>👤 選手登入 / 切換帳號</h3>
            <p style="font-size: 0.85rem; color: #7f8c8d; margin-bottom: 10px;">輸入您的獨特暱稱，系統將會為您在雲端保存專屬練習紀錄。</p>
            <input type="text" id="login-username" placeholder="請輸入您的暱稱 (例如: 貓貓)">
            <div class="modal-actions">
                <button id="btn-login-submit" style="background-color: #2ecc71; color: white; font-weight: bold;">登入</button>
                <button id="btn-login-close" class="btn-secondary">取消</button>
            </div>
        </div>
    </div>

    <div id="modal-library" class="modal hidden">
        <div class="modal-content library-content">
            <h3 style="margin-top: 0; margin-bottom: 15px;">📖 完整招式庫</h3>
            <div id="library-list" class="library-list"></div>
            <button id="btn-library-close" class="btn-secondary" style="margin-top: 15px;">返回首頁</button>
        </div>
    </div>

    <script type="importmap">
        {
          "imports": {
            "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
            "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"
          }
        }
    </script>
    <script type="module">
        import { AppController } from "./js/app.js";
        
        // 🌟 核心保證：DOM 完全載入後才執行初始化，排除綁定空對象問題
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', () => AppController.init());
        } else {
            AppController.init();
        }
    </script>
</body>
</html>

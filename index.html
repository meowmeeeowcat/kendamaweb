<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>劍玉招式練習</title>
    <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

    <header class="app-header">
        <h1>劍玉招式練習</h1>
        <div id="user-status" class="user-status">未登入 (功能皆可使用，進度將不儲存)</div>
    </header>

    <main class="app-content">
        <section class="card-section stable-section">
            <h2>今日穩固招式</h2>
            <div id="stable-trick-card" class="trick-card stable">
                <div class="trick-info">
                    <div class="trick-name" id="stable-trick-name">載入中...</div>
                    
                    <div class="card-controls">
                        <select id="select-stable-trick" class="app-select">
                            <option value="">-- 手選熟練招式 --</option>
                        </select>
                        <button id="btn-next-stable" class="btn-action secondary">隨機換一招</button>
                    </div>
                </div>

                <div class="counter-box">
                    <div class="counter-display">
                        <div class="counter-item">
                            <span class="label">目標</span>
                            <span class="value target-count">-</span>
                        </div>
                        <div class="counter-item">
                            <span class="label">今日</span>
                            <span class="value today-count">-</span>
                        </div>
                    </div>
                    <div class="button-group">
                        <button class="btn-count" data-add="1">+</button>
                        <button class="btn-count" data-add="-1">-</button>
                    </div>
                </div>
            </div>
        </section>

        <section class="card-section challenge-section">
            <h2>新招式挑戰</h2>
            <div id="challenge-trick-card" class="trick-card challenge">
                <div class="trick-info">
                    <div class="trick-name" id="challenge-trick-name">載入中...</div>
                    
                    
                    <div class="card-controls">
                        <select id="select-challenge-trick" class="app-select">
                            <option value="">-- 手選挑戰招式 --</option>
                        </select>
                        <button id="btn-next-challenge" class="btn-action secondary">隨機換一招</button>
                    </div>
                </div>
                
                <div class="action-box">
                    <button id="btn-challenge-success" class="btn-action success">挑戰成功</button>
                </div>
            </div>
        </section>
    </main>

    <nav class="bottom-nav">
        <button id="btn-login-trigger" class="btn-nav accent">帳號登入</button>
        <button id="btn-stats-trigger" class="btn-nav">今日統計</button>
        <button id="btn-library-trigger" class="btn-nav">完整招式庫</button>
    </nav>

    <div id="modal-login" class="modal hidden">
        <div class="modal-content">
            <h3>帳號登入</h3>
            <p class="modal-tip">輸入您的獨特暱稱，系統將會為您在雲端保存專屬練習紀錄。</p>
            <input type="text" id="login-username" placeholder="請輸入您的暱稱 (例如: 貓貓)">
            <div class="modal-actions">
                <button id="btn-login-submit" class="btn-action success">登入</button>
                <button id="btn-login-close" class="btn-action secondary">取消</button>
            </div>
            <button id="btn-logout" class="btn-action logout hidden">登出（回到訪客模式）</button>
        </div>
    </div>

    <div id="modal-stats" class="modal hidden">
        <div class="modal-content stats-content">
            <h3>今日練習統計</h3>
            <div id="stats-list" class="library-list">
                </div>
            <button id="btn-stats-close" class="btn-action secondary">返回首頁</button>
        </div>
    </div>

    <div id="modal-library" class="modal hidden">
        <div class="modal-content library-content">
            <h3>完整招式庫</h3>
            
            <div class="filter-group">
                <select id="filter-category" class="app-select">
                    <option value="">全部大分類</option>
                </select>
                <select id="filter-subcategory" class="app-select">
                    <option value="">全部小分類</option>
                </select>
            </div>

            <div id="library-list" class="library-list"></div>
            <button id="btn-library-close" class="btn-action secondary">返回首頁</button>
        </div>
    </div>

    <script type="importmap">
        {
          "imports": {
            "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
            "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"
          }
        }
    </script>
    <script type="module">
        import { AppController } from "./js/app.js";
        document.addEventListener("DOMContentLoaded", () => {
            AppController.init();
        });
    </script>

</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>劍玉招式練習庫</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header class="app-header">
        <h1>劍玉練習庫</h1>
        <div id="user-status" class="user-status">未登入 (進度將不儲存)</div>
    </header>

    <main class="app-content">
        <section class="card-section">
            <div id="stable-trick-card" class="card">
                <h2>🔥 今日穩固 (熟練池)</h2>
                <div class="trick-name">載入中...</div>
                <div class="counter-display">
                    <span>目標: <span class="target-count">-</span> 次</span>
                    <span>今日: <span class="today-count">-</span> 次</span>
                </div>
                <div class="button-group">
                    <button class="btn-count" data-add="1">+1</button>
                    <button class="btn-count" data-add="-1">-1</button>
                </div>
                
                <!-- 手選與隨機控制區塊（已修正隨機換招按鈕字體顏色為白色） -->
                <div style="margin-top: 15px; display: flex; gap: 8px; justify-content: center; align-items: center;">
                    <select id="select-stable-trick" style="flex: 1; padding: 6px; border-radius: 4px; border: 1px solid #ddd; font-size: 0.85rem;">
                        <option value="">-- 手選熟練招式 --</option>
                    </select>
                    <button id="btn-stable-complete" class="btn-action" style="background-color: #34495e; color: white; padding: 6px 12px; font-size: 0.85rem; white-space: nowrap; border: none; border-radius: 4px; cursor: pointer;">🎲 隨機換招</button>
                </div>
            </div>
        </section>

        <section class="card-section">
        <div id="challenge-trick-card" class="card">
            <h2>🏆 新招式挑戰 (未解鎖)</h2>
            <div class="trick-name">載入中...</div>
            <div class="counter-display">
                <span>今日練習: <span class="today-count">-</span> 次</span>
            </div>
            <div class="button-group">
                <button class="btn-count" data-add="1">+1</button>
                <button class="btn-count" data-add="-1">-1</button>
            </div>
            
            <!-- 手選與隨機控制區塊（已修正隨機換招按鈕字體顏色為白色） -->
            <div style="margin-top: 15px; display: flex; gap: 8px; justify-content: center; align-items: center;">
                <select id="select-challenge-trick" style="flex: 1; padding: 6px; border-radius: 4px; border: 1px solid #ddd; font-size: 0.85rem;">
                    <option value="">-- 手選挑戰招式 --</option>
                </select>
                <button id="btn-challenge-skip" class="btn-action" style="background-color: #34495e; color: white; padding: 6px 12px; font-size: 0.85rem; white-space: nowrap; border: none; border-radius: 4px; cursor: pointer;">🎲 隨機換招</button>
            </div>
            
            <!-- 🌟 修正點：縮短按鈕長度，使其居中且寬度適中 -->
            <div style="text-align: center; margin-top: 15px;">
                <button id="btn-challenge-complete" class="btn-action" style="display: inline-block; padding: 8px 20px; background-color: #2ecc71; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer;">✅ 挑戰成功 (解鎖並移入熟練池)</button>
            </div>
        </div>
        </section>
    </main>

    <nav class="bottom-nav">
        <button id="btn-login-trigger" class="nav-btn" style="flex: 0 0 30%;">🔐 登入</button>
        <button id="btn-stats-trigger" class="nav-btn" style="flex: 0 0 30%; background-color: #3498db;">📊 統計</button>
        <button id="btn-library-trigger" class="nav-btn" style="flex: 0 0 30%; background-color: #2ecc71;">📖 招式庫</button>
    </nav>

    <div id="modal-login" class="modal hidden">
        <div class="modal-content">
            <h3>使用者登入 / 快速註冊</h3>
            <p style="font-size: 0.85rem; color: #7f8c8d; margin-bottom: 10px;">輸入暱稱即可登入。若暱稱不存在將自動建立新帳號。</p>
            <input type="text" id="login-username" placeholder="請輸入您的暱稱">
            <div class="modal-actions">
                <button id="btn-login-submit">進入系統</button>
                <button id="btn-login-close" class="btn-secondary">關閉</button>
            </div>
        </div>
    </div>
    <div id="modal-stats" class="modal hidden">
        <div class="modal-content library-content">
            <h3>📊 每日練習統計</h3>
            <p style="font-size: 0.85rem; color: #7f8c8d; margin-bottom: 10px;">這裡顯示您過去每天的精進成果：</p>
            <div id="stats-list" class="library-list">
                <p style="text-align:center; color:#999; margin-top:20px;">載入統計中...</p>
            </div>
            <button id="btn-stats-close" class="btn-secondary">返回首頁</button>
        </div>
    </div>

    <div id="modal-library" class="modal hidden">
        <div class="modal-content library-content">
            <h3 style="margin-top: 0; margin-bottom: 15px;">📖 完整招式庫</h3>

            <div id="add-trick-input-zone" style="background-color: #f8f9fa; padding: 12px; border-radius: 8px; margin-bottom: 15px; border: 1px dashed #e67e22; display: flex; justify-content: space-between; align-items: center; gap: 8px;">
                <input type="text" id="new-trick-name" placeholder="輸入全域新招式 (例如: 宇宙一周)" style="flex: 1; padding: 8px; border: 1px solid #ddd; border-radius: 4px; font-size: 0.9rem;">
                <button id="btn-add-trick-submit" style="padding: 8px 16px; background-color: #e67e22; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; white-space: nowrap;">確認新增</button>
            </div>

            <div id="library-list" class="library-list"></div>
            
            <button id="btn-library-close" class="btn-secondary" style="margin-top: 15px;">返回首頁</button>
        </div>
    </div>

    <script type="importmap">
        {
          "imports": {
            "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
            "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"
          }
        }
    </script>

    <script type="module">
        import { AppController } from "./js/app.js";

        // 🌟 防禦機制：等待 DOM 樹與所有本地 JS 載入完成後再啟動，防止任何 null 致命中斷
        window.addEventListener('load', () => {
            try {
                if (window.AppController || AppController) {
                    AppController.init();
                }
            } catch (error) {
                console.error("【系統防禦提示】檢測到檔案載入異常，啟動保底控制常規運作：", error);
                // 如果因為 404 導致初始化斷裂，強行讓頁面基本 DOM 按鈕不鎖死
                const statusEl = document.getElementById('user-status');
                if (statusEl) statusEl.innerText = "🟢 本地安全模式 (雲端連線異常)";
            }
        });
    </script>
  
      <script type="module" src="js/auth.js"></script>
      <script type="module" src="js/library.js"></script>
      <script type="module" src="js/app.js"></script>
</body>
</html>
